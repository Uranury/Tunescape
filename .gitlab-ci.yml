# ── Notify ─────────────────────────────────────────────────────────────────────

notify_mr:
  <<: *notify_telegram
  stage: notify
  variables:
    TELEGRAM_MESSAGE: |
      📬 *New MR Opened*

      *Title:* $CI_MERGE_REQUEST_TITLE
      *Author:* $CI_MERGE_REQUEST_AUTHOR
      *Branch:* `$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME` → `$CI_MERGE_REQUEST_TARGET_BRANCH_NAME`
      *Link:* $CI_MERGE_REQUEST_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_IID
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

notify_success:
  <<: *notify_telegram
  stage: notify
  variables:
    TELEGRAM_MESSAGE: |
      ✅ *Pipeline Passed*

      *Branch:* `$CI_COMMIT_BRANCH`
      *Commit:* $CI_COMMIT_SHORT_SHA
      *Author:* $CI_COMMIT_AUTHOR
      *Message:* $CI_COMMIT_MESSAGE
      *Pipeline:* $CI_PIPELINE_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: on_success

notify_failure:
  <<: *notify_telegram
  stage: notify
  variables:
    TELEGRAM_MESSAGE: |
      ❌ *Pipeline Failed*

      *Branch:* `$CI_COMMIT_BRANCH`
      *Commit:* $CI_COMMIT_SHORT_SHA
      *Author:* $CI_COMMIT_AUTHOR
      *Message:* $CI_COMMIT_MESSAGE
      *Pipeline:* $CI_PIPELINE_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: on_failure