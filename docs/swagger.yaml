basePath: /
definitions:
  gitlab_com_Uranury_tunescape_internal_playlist.Playlist:
    properties:
      created_at:
        type: string
      embed_url:
        type: string
      external_url:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  gitlab_com_Uranury_tunescape_internal_track.Track:
    properties:
      id:
        type: string
      name:
        type: string
      popularity:
        type: integer
      spotify_id:
        type: string
    type: object
  gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError:
    properties:
      code:
        type: integer
      details: {}
      message:
        type: string
    type: object
  internal_analytics.AudioFeatureAverages:
    properties:
      acousticness:
        type: number
      danceability:
        type: number
      energy:
        type: number
      instrumentalness:
        type: number
      liveness:
        type: number
      loudness:
        type: number
      speechiness:
        type: number
      tempo:
        type: number
      valence:
        type: number
    type: object
  internal_analytics.MusicTasteResponse:
    properties:
      averages:
        $ref: '#/definitions/internal_analytics.AudioFeatureAverages'
      snapshot_id:
        type: string
      tracks_count:
        type: integer
    type: object
  internal_auth.loginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.signupRequest:
    properties:
      display_name:
        minLength: 1
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  internal_auth.tokenResponse:
    properties:
      access_token:
        type: string
    type: object
  internal_friends.FriendProfile:
    properties:
      display_name:
        type: string
      spotify_connected:
        type: boolean
      spotify_id:
        type: string
      user_id:
        type: string
    type: object
  internal_friends.IncomingRequest:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      request_id:
        type: integer
      sender_id:
        type: string
    type: object
  internal_friends.TasteComparison:
    properties:
      compatibility_score:
        type: number
      mine:
        $ref: '#/definitions/internal_friends.TasteScores'
      theirs:
        $ref: '#/definitions/internal_friends.TasteScores'
    type: object
  internal_friends.TasteScores:
    properties:
      acousticness:
        type: number
      danceability:
        type: number
      energy:
        type: number
      valence:
        type: number
    type: object
  internal_friends.sendRequestBody:
    properties:
      receiver_id:
        type: string
    required:
    - receiver_id
    type: object
  internal_leaderboard.Entry:
    properties:
      display_name:
        type: string
      rank:
        type: integer
      score:
        type: number
      user_id:
        type: string
    type: object
  internal_leaderboard.LeaderboardResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/internal_leaderboard.Entry'
        type: array
      feature:
        type: string
    type: object
  internal_playlist.Response:
    properties:
      embed_url:
        type: string
      external_url:
        type: string
      name:
        type: string
      playlist_id:
        type: string
    type: object
  internal_snapshot.Snapshot:
    properties:
      created_at:
        type: string
      id:
        type: string
      tracks:
        items:
          $ref: '#/definitions/gitlab_com_Uranury_tunescape_internal_track.Track'
        type: array
      user_id:
        type: string
    type: object
  internal_snapshot.SnapshotSummary:
    properties:
      created_at:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
  internal_trends.SnapshotPoint:
    properties:
      acousticness:
        type: number
      created_at:
        type: string
      danceability:
        type: number
      energy:
        type: number
      instrumentalness:
        type: number
      liveness:
        type: number
      loudness:
        type: number
      snapshot_id:
        type: string
      speechiness:
        type: number
      tempo:
        type: number
      tracks_count:
        type: integer
      valence:
        type: number
    type: object
  internal_trends.TrendsResponse:
    properties:
      points:
        items:
          $ref: '#/definitions/internal_trends.SnapshotPoint'
        type: array
      user_id:
        type: string
    type: object
  internal_user.ProfileResponse:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      email:
        type: string
      spotify_connected:
        type: boolean
    type: object
info:
  contact: {}
  description: Tunescape backend API.
  title: Tunescape API
  version: "1.0"
paths:
  /analytics/top-tracks:
    get:
      description: Reads the authenticated user's latest snapshot, fetches audio features
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_analytics.MusicTasteResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: No snapshot found for user
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Get music taste based on top tracks
      tags:
      - analytics
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates user credentials, creates access token and refresh token
        cookie.
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.tokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes refresh token and clears the refresh_token cookie.
      parameters:
      - description: Refresh token (cookie)
        in: header
        name: refresh_token
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      description: Validates refresh token cookie, revokes it, and issues a new access
        token and refresh token cookie.
      parameters:
      - description: Refresh token (cookie)
        in: header
        name: refresh_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.tokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Refresh access token
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Creates a new user account and issues access token and refresh
        token cookie.
      parameters:
      - description: Signup request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.signupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.tokenResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Signup
      tags:
      - auth
  /auth/spotify/callback:
    get:
      description: Handles Spotify OAuth callback, links Spotify account to the current
        user, and redirects back to the frontend.
      parameters:
      - description: Spotify authorization code
        in: query
        name: code
        required: true
        type: string
      - description: Spotify state
        in: query
        name: state
        required: true
        type: string
      - description: oauth_state cookie value
        in: header
        name: oauth_state
        required: true
        type: string
      - description: refresh_token cookie value
        in: header
        name: refresh_token
        required: true
        type: string
      responses:
        "302":
          description: Found (redirect to frontend with connected=1 or error=...)
      summary: Spotify OAuth callback
      tags:
      - spotify
  /auth/spotify/login:
    get:
      description: Redirects to Spotify authorization endpoint and sets oauth_state
        cookie.
      responses:
        "302":
          description: Found (redirect to Spotify authorization endpoint)
      summary: Spotify OAuth login
      tags:
      - spotify
  /friends:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_friends.FriendProfile'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: List friends
      tags:
      - friends
  /friends/{friend_id}/compare:
    get:
      description: Returns averaged audio feature scores and a 0–100 compatibility
        score. Returns 422 if the friend has no listening data yet.
      parameters:
      - description: Friend's user ID
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_friends.TasteComparison'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Compare music tastes with a friend
      tags:
      - friends
  /friends/{friend_id}/playlists:
    get:
      description: Returns playlists created via Tunescape. Returns 422 if the friend
        has not connected Spotify yet.
      parameters:
      - description: Friend's user ID
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/gitlab_com_Uranury_tunescape_internal_playlist.Playlist'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Get a friend's playlists
      tags:
      - friends
  /friends/requests:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_friends.IncomingRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: List incoming friend requests
      tags:
      - friends
    post:
      consumes:
      - application/json
      parameters:
      - description: receiver
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_friends.sendRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Send a friend request
      tags:
      - friends
  /friends/requests/{id}/accept:
    post:
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Accept a friend request
      tags:
      - friends
  /friends/requests/{id}/reject:
    post:
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Reject a friend request
      tags:
      - friends
  /leaderboards/{feature}:
    get:
      description: 'Returns the top-ranked users for a given audio feature. Valid
        features: valence, energy, danceability, acousticness.'
      parameters:
      - description: Audio feature
        enum:
        - valence
        - energy
        - danceability
        - acousticness
        in: path
        name: feature
        required: true
        type: string
      - description: Number of entries to return (default 10)
        in: query
        name: limit
        type: integer
      - description: Number of entries to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_leaderboard.LeaderboardResponse'
        "400":
          description: Invalid feature
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Get global leaderboard
      tags:
      - leaderboards
  /me/playlists/top-tracks:
    post:
      description: Creates a private Spotify playlist containing all tracks from the
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_playlist.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: No snapshot found — create one first
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "422":
          description: Spotify account not connected
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "502":
          description: Spotify temporarily unavailable
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Create Spotify playlist from latest snapshot
      tags:
      - playlists
  /me/profile:
    get:
      description: Returns the authenticated user's display name, email, avatar, and
        Spotify connection status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_user.ProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Get current user profile
      tags:
      - user
  /me/report:
    get:
      description: Generates and streams a PDF report containing the user's top tracks,
        leaderboard rankings, and summary stats.
      produces:
      - application/pdf
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
      - BearerAuth: []
      summary: Download PDF report
      tags:
      - report
  /me/snapshots:
    get:
      description: Returns all snapshots for the authenticated user, ordered by most
        recent first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_snapshot.SnapshotSummary'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: List snapshots
      tags:
      - snapshots
    post:
      description: Fetches the authenticated user's top 50 tracks from Spotify,
      parameters:
      - default: medium_term
        description: Time range for top tracks (short_term | medium_term | long_term)
        enum:
        - short_term
        - medium_term
        - long_term
        in: query
        name: time_range
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_snapshot.Snapshot'
        "400":
          description: Invalid time_range value
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "422":
          description: Spotify account not connected
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "502":
          description: Spotify temporarily unavailable
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Create top-tracks snapshot
      tags:
      - snapshots
  /me/snapshots/{id}:
    get:
      description: Returns a single snapshot with its full track list. Returns 404
        if the snapshot does not exist or belongs to another user.
      parameters:
      - description: Snapshot UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_snapshot.Snapshot'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Get snapshot by ID
      tags:
      - snapshots
  /me/spotify:
    delete:
      description: Removes the Spotify connection and tokens for the authenticated
        user.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      summary: Disconnect Spotify account
      tags:
      - spotify
  /me/trends:
    get:
      description: Returns a time-ordered series of audio feature averages, one point
        per snapshot.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_trends.TrendsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gitlab_com_Uranury_tunescape_pkg_apperrors.HTTPError'
      security:
