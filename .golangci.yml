version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - unused
    - misspell

formatters:
  enable:
    - goimports

formatters-settings:
  goimports:
    local-prefixes: gitlab.com/Uranury/tunescape

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck