<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tunescape</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page { display: none; width: 100%; max-width: 400px; padding: 0 20px; }
    .page.active { display: block; }

    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9rem; }

    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; }
    .tab-btn {
      background: none; border: none; color: #888; padding: 10px 20px;
      cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: #e8e8e8; border-bottom-color: #1db954; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px; background: #1a1a1a;
      border: 1px solid #2a2a2a; border-radius: 6px;
      color: #e8e8e8; font-size: 0.95rem; outline: none;
    }
    input:focus { border-color: #1db954; }

    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 6px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 4px;
    }
    .btn-primary { background: #1db954; color: #000; }
    .btn-primary:hover { background: #1ed760; }
    .btn-secondary {
      background: none; border: 1px solid #2a2a2a; color: #888;
      margin-top: 10px;
    }
    .btn-secondary:hover { border-color: #444; color: #e8e8e8; }
    .btn-danger { background: none; border: 1px solid #c0392b; color: #c0392b; margin-top: 10px; }
    .btn-danger:hover { background: #c0392b; color: #fff; }

    .msg { padding: 10px 12px; border-radius: 6px; font-size: 0.88rem; margin-top: 14px; }
    .msg.error { background: #2a1010; color: #e57373; border: 1px solid #5a2020; }
    .msg.ok    { background: #0d2a15; color: #81c784; border: 1px solid #1b5e20; }

    /* dashboard */
    .spotify-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 24px; margin-bottom: 16px; text-align: center;
    }
    .spotify-card p { color: #888; font-size: 0.9rem; margin-bottom: 16px; }

    /* result page */
    .result-icon { font-size: 3rem; margin-bottom: 16px; }
    .result-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .result-body { color: #888; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- Auth page -->
  <div id="auth-page" class="page">
    <h1>Tunescape</h1>
    <p class="subtitle">Sign in to continue</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('login')">Log In</button>
      <button class="tab-btn" onclick="showTab('register')">Register</button>
    </div>

    <div id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" onclick="login()">Log In</button>
      <div id="login-msg"></div>
    </div>

    <div id="tab-register" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="reg-password" type="password" placeholder="min 8 characters">
      </div>
      <div class="form-group">
        <label>Display name</label>
        <input id="reg-name" type="text" placeholder="Your name">
      </div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
      <div id="reg-msg"></div>
    </div>
  </div>

  <!-- Dashboard page -->
  <div id="dashboard-page" class="page">
    <h1>Tunescape</h1>
    <p class="subtitle">Manage your account</p>
    <div class="spotify-card">
      <p>Connect your Spotify account to enable music analytics.</p>
      <button class="btn btn-primary" onclick="connectSpotify()">Connect Spotify</button>
    </div>
    <button class="btn btn-danger" onclick="logout()">Log Out</button>
  </div>

  <!-- Result page -->
  <div id="result-page" class="page">
    <div id="result-icon" class="result-icon"></div>
    <div id="result-title" class="result-title"></div>
    <div id="result-body" class="result-body"></div>
    <button class="btn btn-primary" onclick="goBack()">Continue</button>
  </div>

  <script>
    // ── routing ──────────────────────────────────────────────────────────────

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showTab(tab) {
      document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0) === (tab === 'login'));
      });
    }

    function showMsg(id, text, isError) {
      const el = document.getElementById(id);
      el.className = 'msg ' + (isError ? 'error' : 'ok');
      el.textContent = text;
    }

    function showResult(success, title, body) {
      document.getElementById('result-icon').textContent  = success ? '✓' : '✗';
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-body').textContent  = body;
      document.getElementById('result-icon').style.color  = success ? '#1db954' : '#e57373';
      showPage('result-page');
    }

    function goBack() {
      showPage('dashboard-page');
    }

    // ── init ─────────────────────────────────────────────────────────────────

    const ERROR_MESSAGES = {
      not_logged_in:          'You must be logged in before connecting Spotify.',
      session_expired:        'Your session expired. Please log in again.',
      invalid_state:          'OAuth state mismatch — possible replay. Try again.',
      spotify_exchange_failed:'Spotify rejected the authorization code. Try again.',
      spotify_profile_failed: 'Could not fetch your Spotify profile. Make sure your Spotify account is added to the app\'s allowlist in the Spotify Developer Dashboard.',
      spotify_already_linked: 'This Spotify account is already linked to another user.',
      db_error:               'Server error saving your Spotify connection. Try again.',
      missing_code:           'Spotify did not return an authorization code.',
    };

    (async function init() {
      const params = new URLSearchParams(window.location.search);
      history.replaceState(null, '', '/');

      if (params.get('connected') === '1') {
        showResult(true, 'Spotify Connected!', 'Your account is linked. Music analytics are now available.');
        return;
      }

      if (params.get('error')) {
        const msg = ERROR_MESSAGES[params.get('error')] ?? 'Spotify connection failed: ' + params.get('error');
        showResult(false, 'Connection Failed', msg);
        return;
      }

      // check session
      const res = await fetch('/auth/refresh', { method: 'POST', credentials: 'same-origin' });
      showPage(res.ok ? 'dashboard-page' : 'auth-page');
    })();

    // ── auth ─────────────────────────────────────────────────────────────────

    async function login() {
      const res = await fetch('/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        }),
      });
      if (res.ok) {
        showPage('dashboard-page');
      } else {
        const data = await res.json().catch(() => ({}));
        showMsg('login-msg', data.error ?? 'Invalid email or password.', true);
      }
    }

    async function register() {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:        document.getElementById('reg-email').value,
          password:     document.getElementById('reg-password').value,
          display_name: document.getElementById('reg-name').value,
        }),
      });
      if (res.ok) {
        showMsg('reg-msg', 'Account created! You can now log in.', false);
        showTab('login');
      } else {
        const data = await res.json().catch(() => ({}));
        showMsg('reg-msg', data.error ?? 'Registration failed.', true);
      }
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
      showPage('auth-page');
    }

    function connectSpotify() {
      window.location.href = '/auth/spotify/login';
    }
  </script>
</body>
</html>
